name: CI

on:
  pull_request:
    branches: [main]
    # default activity types は [opened, synchronize, reopened] のみで、
    # PR の base ブランチ切替時 (= edited) では発火しない。base 切替後にも
    # CI を回したいので edited を明示追加 (#90)。本文タイトル編集の誤発火は
    # 許容 (CI は typecheck/lint/build/RLS で 2 分程度)。
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]

# 同一ブランチで新しい push があれば古い実行をキャンセル
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: typecheck / lint / build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: RLS guard (static, no DB)
        # 新規 public テーブルに RLS+REVOKE が無ければ落とす (#38)
        run: npm run check:rls

      - name: Build
        # DB/Supabase へは接続しない (全ページ動的)。
        # モジュール読み込み時の eager 参照対策にダミー値を渡すだけ。
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://dummy.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          SUPABASE_SERVICE_ROLE_KEY: dummy-service-role-key
          DATABASE_URL: postgresql://user:pass@localhost:5432/postgres
        run: npm run build
